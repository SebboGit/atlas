<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="theme-color" content="#e8dec7" />
    <title>Offline · Atlas</title>
    <style>
      /* Self-contained: this page is served from the cache with no network,
         so no web fonts or external assets. Palette mirrors globals.css. */
      :root {
        --bg: #e8dec7;
        --ink: hsl(28 22% 14%);
        --muted: hsl(28 14% 34%);
        --terracotta: hsl(18 52% 36%);
      }
      * {
        box-sizing: border-box;
      }
      html,
      body {
        margin: 0;
        min-height: 100%;
      }
      body {
        min-height: 100dvh;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 1.5rem;
        padding: 2rem max(1.5rem, env(safe-area-inset-left)) calc(2rem + env(safe-area-inset-bottom));
        text-align: center;
        background-color: var(--bg);
        color: var(--ink);
        font-family: ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
        -webkit-font-smoothing: antialiased;
      }
      svg {
        width: 84px;
        height: 84px;
      }
      h1 {
        margin: 0;
        font-family: ui-serif, Georgia, "Times New Roman", serif;
        font-weight: 600;
        font-size: 1.75rem;
        letter-spacing: -0.01em;
      }
      p {
        margin: 0;
        max-width: 30ch;
        color: var(--muted);
        line-height: 1.5;
      }
      .label {
        font-family: ui-monospace, "SF Mono", Menlo, Consolas, monospace;
        font-size: 0.7rem;
        letter-spacing: 0.18em;
        text-transform: uppercase;
        color: var(--muted);
      }
      a {
        margin-top: 0.5rem;
        display: inline-block;
        padding: 0.7rem 1.4rem;
        min-height: 44px;
        border-radius: 0.875rem;
        background: var(--terracotta);
        color: #f7f0e3;
        font-weight: 600;
        text-decoration: none;
      }
    </style>
  </head>
  <body>
    <svg viewBox="0 0 100 100" role="img" aria-label="Atlas">
      <circle cx="50" cy="50" r="46" fill="hsl(18 52% 36%)" />
      <path
        fill="#d2c8ac"
        d="M30 22a30 30 0 0 0-4 50c-3-9 2-17 9-21 5-3 4-9 0-12-5-4-3-12 4-14 1 0 0-2-1-3-2-3-5-1-7 0Zm38 12c5 4 10 11 9 20-1 6-7 9-12 7-5-1-7-7-4-11 3-5-1-10-6-9-2 0-2-3 0-4 4-3 9-5 13-3Z"
      />
    </svg>
    <span class="label">Atlas</span>
    <h1>Offline</h1>
    <p>Pages you've already opened are available. Reconnect for anything new.</p>
    <a href="/">Try again</a>
  </body>
</html>
