# Release — build + push the multi-arch Atlas images to GHCR.
#
# One version drives TWO images via a build matrix: the app (unsuffixed) and
# the pg-boss worker (suffixed `-worker`), e.g. `1.2.3` + `1.2.3-worker`,
# `latest` + `latest-worker`. A pull-based deploy needs both — the compose
# `worker` service runs migrations and writes the readiness marker the `app`
# gates on, so without a worker image the stack can't come up.
#
# Triggers on `v*` tags only (plus a manual dispatch), so it stays off the
# 2k-min/mo budget on normal pushes — a tag is the deliberate "cut a release"
# signal. arm64 is built via QEMU emulation, which is slow, but only ever
# runs on a release so the cost is bounded and rare.
#
# The published images are PUBLIC. A manual dispatch is therefore restricted to
# `main` (see the job `if:`) so a WIP feature branch can't be pushed out as a
# publicly-pullable `:edge` image — only tag pushes and main-dispatch publish.
name: Release

on:
  push:
    tags: ['v*']
  workflow_dispatch:
    inputs:
      tag:
        description: 'Image tag for a manual build from main (no git tag is created)'
        required: false
        default: edge

# Cancel a superseded manual run; tag pushes are unique so this is a no-op there.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  packages: write

jobs:
  release:
    name: Build · Push ${{ matrix.target }} (linux/amd64, linux/arm64)
    runs-on: ubuntu-latest
    # Tag pushes (`event_name == 'push'`) always publish. Manual dispatch only
    # publishes from `main` — never a feature branch — since the image is public.
    # NB: a bare `github.ref == 'refs/heads/main'` would skip tag releases,
    # because on a tag push `github.ref` is `refs/tags/v*`, not a branch.
    if: github.event_name != 'workflow_dispatch' || github.ref == 'refs/heads/main'
    timeout-minutes: 60

    strategy:
      matrix:
        include:
          - target: prod
            suffix: ''
          - target: worker
            suffix: '-worker'

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          # Don't leave the token in local git config — nothing here writes
          # back to git, so the credential is pure attack surface.
          persist-credentials: false

      - name: Set up QEMU
        uses: docker/setup-qemu-action@29109295f81e9208d7d86ff1c6c12d2833863392 # v3

      - name: Set up Buildx
        uses: docker/setup-buildx-action@e468171a9de216ec08956ac3ada2f0791b6bd435 # v3

      - name: Log in to GHCR
        uses: docker/login-action@74a5d142397b4f367a81961eba4e8cd7edddf772 # v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Derive image tags
        id: meta
        uses: docker/metadata-action@902fa8ec7d6ecbf8d84d538b9b233a880e428804 # v5
        with:
          # Lowercase — GHCR requires it; repo owner is SebboGit.
          images: ghcr.io/sebbogit/atlas
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
            type=raw,value=${{ inputs.tag }},enable=${{ github.event_name == 'workflow_dispatch' }}
          # `suffix` is appended to every derived tag; `onlatest=true` extends
          # it to `latest` too. `latest` is enabled only on real tag pushes.
          # Net result per leg: app → `1.2.3` / `latest`; worker → `1.2.3-worker`
          # / `latest-worker`. The two image names never collide.
          flavor: |
            suffix=${{ matrix.suffix }},onlatest=true
            latest=${{ github.ref_type == 'tag' }}

      - name: Build and push
        uses: docker/build-push-action@263435318d21b8e681c14492fe198d362a7d2c83 # v6
        with:
          context: .
          file: ./Dockerfile
          target: ${{ matrix.target }}
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          # Scope the cache per target so the two parallel matrix legs don't
          # clobber each other's gha cache entries.
          cache-from: type=gha,scope=${{ matrix.target }}
          cache-to: type=gha,mode=max,scope=${{ matrix.target }}
