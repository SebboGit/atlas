# Release тАФ build + push the multi-arch Atlas images to GHCR.
#
# One version drives TWO images via a build matrix: the app (unsuffixed) and
# the pg-boss worker (suffixed `-worker`), e.g. `1.2.3` + `1.2.3-worker`,
# `latest` + `latest-worker`. A pull-based deploy needs both тАФ the compose
# `worker` service runs migrations and writes the readiness marker the `app`
# gates on, so without a worker image the stack can't come up.
#
# Triggers on `v*` tags only (plus a manual dispatch), so it stays off the
# 2k-min/mo budget on normal pushes тАФ a tag is the deliberate "cut a release"
# signal. arm64 is built via QEMU emulation, which is slow, but only ever
# runs on a release so the cost is bounded and rare.
#
# The published images are PUBLIC. A manual dispatch is therefore restricted to
# `main` (see the job `if:`) so a WIP feature branch can't be pushed out as a
# publicly-pullable `:edge` image тАФ only tag pushes and main-dispatch publish.
name: Release

on:
  push:
    tags: ['v*']
  workflow_dispatch:
    inputs:
      tag:
        description: 'Image tag for a manual build from main (no git tag is created)'
        required: false
        default: edge

# Cancel a superseded manual run; tag pushes are unique so this is a no-op there.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  packages: write

jobs:
  release:
    name: Build ┬╖ Push ${{ matrix.target }} (linux/amd64, linux/arm64)
    runs-on: ubuntu-latest
    # Tag pushes (`event_name == 'push'`) always publish. Manual dispatch only
    # publishes from `main` тАФ never a feature branch тАФ since the image is public.
    # NB: a bare `github.ref == 'refs/heads/main'` would skip tag releases,
    # because on a tag push `github.ref` is `refs/tags/v*`, not a branch.
    if: github.event_name != 'workflow_dispatch' || github.ref == 'refs/heads/main'
    timeout-minutes: 60

    strategy:
      matrix:
        include:
          - target: prod
            suffix: ''
          - target: worker
            suffix: '-worker'

    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v6
        with:
          # Don't leave the token in local git config тАФ nothing here writes
          # back to git, so the credential is pure attack surface.
          persist-credentials: false

      - name: Set up QEMU
        uses: docker/setup-qemu-action@06116385d9baf250c9f4dcb4858b16962ea869c3 # v4.1.0

      - name: Set up Buildx
        uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5 # v4.1.0

      - name: Log in to GHCR
        uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # v4.2.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Derive image tags
        id: meta
        uses: docker/metadata-action@80c7e94dd9b9319bd5eb7a0e0fe9291e23a2a2e9 # v6.1.0
        with:
          # Lowercase тАФ GHCR requires it; repo owner is SebboGit.
          images: ghcr.io/sebbogit/atlas
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
            type=raw,value=${{ inputs.tag }},enable=${{ github.event_name == 'workflow_dispatch' }}
          # `suffix` is appended to every derived tag; `onlatest=true` extends
          # it to `latest` too. `latest` is enabled only on real tag pushes.
          # Net result per leg: app тЖТ `1.2.3` / `latest`; worker тЖТ `1.2.3-worker`
          # / `latest-worker`. The two image names never collide.
          flavor: |
            suffix=${{ matrix.suffix }},onlatest=true
            latest=${{ github.ref_type == 'tag' }}

      - name: Build and push
        uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf # v7.2.0
        with:
          context: .
          file: ./Dockerfile
          target: ${{ matrix.target }}
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          # Scope the cache per target so the two parallel matrix legs don't
          # clobber each other's gha cache entries.
          cache-from: type=gha,scope=${{ matrix.target }}
          cache-to: type=gha,mode=max,scope=${{ matrix.target }}
