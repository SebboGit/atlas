name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Cancel superseded runs on the same branch/PR to save minutes
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  quality:
    name: Lint · Typecheck · Test · Build
    runs-on: ubuntu-latest
    timeout-minutes: 15

    services:
      postgres:
        image: postgres:18-alpine
        env:
          POSTGRES_USER: atlas
          POSTGRES_PASSWORD: atlas
          POSTGRES_DB: atlas
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U atlas"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      # Build-time env. Real secrets stay in GitHub Secrets and aren't needed for CI.
      DATABASE_URL: postgres://atlas:atlas@localhost:5432/atlas
      AUTH_URL: http://localhost:3000
      # OIDC vars are inert during build — no live PocketID call happens in CI.
      OIDC_ISSUER_URL: http://localhost:0
      OIDC_CLIENT_ID: ci-placeholder
      OIDC_CLIENT_SECRET: ci-placeholder
      STORAGE_DIR: /tmp/atlas-documents
      STORAGE_MAX_BYTES: '20971520'
      NEXT_TELEMETRY_DISABLED: '1'

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Set up pnpm
        uses: pnpm/action-setup@0e279bb959325dab635dd2c09392533439d90093 # v6
        with:
          run_install: false

      - name: Set up Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version-file: .nvmrc
          cache: pnpm

      - name: Generate ephemeral AUTH_SECRET
        # Per-run rather than a committed static value. Real production
        # AUTH_SECRET is provided via deployment env, never from CI.
        run: |
          SECRET=$(openssl rand -hex 32)
          echo "::add-mask::$SECRET"
          echo "AUTH_SECRET=$SECRET" >> "$GITHUB_ENV"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Prepare storage dir
        run: mkdir -p "$STORAGE_DIR"

      - name: Run migrations
        run: pnpm db:migrate

      - name: Typecheck
        run: pnpm typecheck

      - name: Lint
        run: pnpm lint

      - name: Test (Vitest)
        run: pnpm test

      - name: Build
        run: pnpm build

  secrets:
    name: Secret scan (gitleaks)
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          # Full history so gitleaks can scan every commit in a push/PR range.
          fetch-depth: 0
          # This job scans untrusted PR content — don't leave the token in .git/config.
          persist-credentials: false

      - name: Scan for committed secrets
        uses: gitleaks/gitleaks-action@ff98106e4c7b2bc287b24eaf42907196329070c7 # v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
