name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Cancel superseded runs on the same branch/PR to save minutes
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  quality:
    name: Lint · Typecheck · Test · Build
    runs-on: ubuntu-latest
    timeout-minutes: 15

    services:
      postgres:
        image: postgres:18-alpine
        env:
          POSTGRES_USER: atlas
          POSTGRES_PASSWORD: atlas
          POSTGRES_DB: atlas
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U atlas"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      # Build-time env. Real secrets stay in GitHub Secrets and aren't needed for CI.
      DATABASE_URL: postgres://atlas:atlas@localhost:5432/atlas
      AUTH_SECRET: ci-only-secret-not-used-in-production
      AUTH_URL: http://localhost:3000
      # OIDC vars are inert during build — no live PocketID call happens in CI.
      OIDC_ISSUER_URL: http://localhost:0
      OIDC_CLIENT_ID: ci-placeholder
      OIDC_CLIENT_SECRET: ci-placeholder
      STORAGE_DIR: /tmp/atlas-documents
      STORAGE_MAX_BYTES: '20971520'
      NEXT_TELEMETRY_DISABLED: '1'

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up pnpm
        uses: pnpm/action-setup@v6
        with:
          run_install: false

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Prepare storage dir
        run: mkdir -p "$STORAGE_DIR"

      - name: Run migrations
        run: pnpm db:migrate

      - name: Typecheck
        run: pnpm typecheck

      - name: Lint
        run: pnpm lint

      - name: Test (Vitest)
        run: pnpm test

      - name: Build
        run: pnpm build
